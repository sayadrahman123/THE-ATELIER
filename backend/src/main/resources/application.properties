# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/theatelier_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT — 256-bit base64 encoded secret
jwt.secret=dGhlYXRlbGllcnNlY3JldGtleWZvcmp3dHRva2VuZ2VuZXJhdGlvbjIwMjQ=
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Razorpay (add your keys from dashboard.razorpay.com)
razorpay.key.id=rzp_test_PLACEHOLDER
razorpay.key.secret=PLACEHOLDER_SECRET

# Logging
logging.level.com.theatelier=DEBUG
logging.level.org.springframework.security=INFO
