# ──────────────────────────────────────────────
# THE ATELIER — Backend Configuration
# Copy this to application.properties and fill in your values
# DO NOT commit application.properties (it is gitignored)
# ──────────────────────────────────────────────

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/theatelier_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_MYSQL_USERNAME
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=YOUR_256_BIT_BASE64_SECRET_HERE
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Razorpay
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# Logging
logging.level.com.theatelier=DEBUG
logging.level.org.springframework.security=INFO
